# Clavi Agent Configuration Example
# 
# Configuration File Locations (in priority order):
# 1) clavi_agent/config/config.yaml - Development mode (current directory)
# 2) ~/.clavi-agent/config/config.yaml - User config directory
# 3) <package>/clavi_agent/config/config.yaml - Package installation directory
#
# To use this config:
# - Copy this file to one of the above locations as config.yaml
# - Fill in your API key and customize settings as needed
# - All config files (config.yaml, mcp.json, system_prompt.md) are in the same directory

# ===== LLM Configuration =====
# MiniMax API Configuration
# MiniMax provides both global and China platforms:
# - Global: https://platform.minimax.io -> api_base: https://api.minimax.io
# - China: https://platform.minimaxi.com -> api_base: https://api.minimaxi.com
# Please choose based on your network environment and get API key from corresponding platform
api_key: "YOUR_API_KEY_HERE"  # Replace with your MiniMax API Key
api_base: "https://api.minimax.io"   # Global users (default)
# api_base: "https://api.minimaxi.com"  # China users
model: "MiniMax-M2"
# LLM provider: "anthropic" or "openai"
# The LLMClient will automatically append /anthropic or /v1 to api_base based on provider
provider: "anthropic"  # Default: anthropic
# OpenAI-compatible providers can use this to explicitly toggle reasoning mode.
# Example: OpenRouter qwen models may require `reasoning_enabled: true`.
reasoning_enabled: false

# ===== Retry Configuration =====
retry:
  enabled: true           # Enable retry mechanism
  max_retries: 3          # Maximum number of retries
  initial_delay: 1.0      # Initial delay time (seconds)
  max_delay: 60.0         # Maximum delay time (seconds)
  exponential_base: 2.0   # Exponential backoff base (delay = initial_delay * base^attempt)

# ===== Agent Configuration =====
max_steps: 100  # Maximum execution steps
max_concurrent_runs: 4  # Max number of root runs executing at the same time across all sessions
run_timeout_seconds: null  # Optional hard timeout per root run; null disables timeout enforcement
parallel_delegate_limit: 4  # Max number of delegated sub-agents running at the same time
workspace_dir: "./workspace"  # Working directory
system_prompt_path: "system_prompt.md"  # System prompt file (same config directory)
log_dir: "./logs"  # Log file directory (can use ~ for home directory, relative to project directory)
session_store_path: "./workspace/.clavi_agent/sessions.db"  # Persistent Web/API session database

# ===== Feature Rollout Flags =====
# Use these switches to stage durable-run capabilities separately in development and production.
# Recommended examples:
# - Development: keep all three enabled for full validation.
# - Production phase 1: disable all three and keep only the legacy chat surface.
# - Production phase 2: enable durable runs first, then trace/approval once verified.
feature_flags:
  enable_durable_runs: true   # Expose /api/runs and the workspace run-management UI
  enable_run_trace: true      # Expose trace/timeline/metrics/diagnostics APIs
  enable_approval_flow: true  # Enable approval waits plus /api/approvals APIs
  enable_supervisor_mode: true  # Expose supervisor delegation policy rollout controls
  enable_worker_model_routing: true  # Expose planner/worker split model routing rollout controls
  enable_compact_prompt_memory: true      # Inject user profile / stable preferences / agent memory into prompts
  enable_session_retrieval: true          # Expose session-history retrieval APIs/tools and retrieved_context injection
  enable_learned_workflow_generation: true  # Auto-generate learned workflow candidates from successful runs
  enable_external_memory_providers: true  # Allow non-local memory providers such as the MCP memory adapter

# ===== Long-Term Memory Provider =====
# `local`: use the built-in SQLite-backed long-term memory store (default)
# `mcp`: prefer the legacy MCP `memory` server when a bridge becomes available, otherwise fall back locally
# `disabled`: turn off user-level long-term memory/profile storage and prompt injection
memory_provider:
  provider: "local"
  allow_fallback_to_local: true
  inject_memories: true
  expose_tools: true
  sync_conversation_turns: true
  mcp_server_name: "memory"

# ===== Local Account Bootstrap =====
# Root account is seeded automatically on first startup.
# Prefer setting the password through the env var below to avoid committing secrets.
auth:
  auto_seed_root: true
  root_username: "root"
  root_display_name: "Root"
  root_password: null
  root_password_env: "CLAVI_AGENT_ROOT_PASSWORD"
  web_session_cookie_name: "clavi_agent_session"
  web_session_ttl_hours: 12

# ===== Tools Configuration =====
tools:
  # Basic tool switches
  enable_file_tools: true  # File read/write/edit tools (ReadTool, WriteTool, EditTool)
  enable_bash: true        # Bash command execution tool
  enable_note: true        # Session note tool (SessionNoteTool)
  
  # Claude Skills
  enable_skills: true      # Enable Skills
  skills_dir: "./skills"   # Skills directory path
  
  # MCP Tools
  enable_mcp: true         # Enable MCP tools
  mcp_config_path: "mcp.json"  # MCP configuration file (same config directory)
                           # Note: API Keys for MCP tools are configured in mcp.json

  # External runtime tool paths
  # These can be filled automatically by `clavi-agent-setup-runtime`
  node_bin: null
  npm_bin: null
  clawhub_bin: null


