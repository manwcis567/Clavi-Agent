<div id="scheduled-tasks-page" class="text-on-surface h-full flex flex-col bg-surface overflow-hidden relative">
    <div class="h-full flex flex-row relative z-20 w-full overflow-hidden bg-surface-container-lowest">
        
        <!-- Sidebar -->
        <div class="w-[320px] shrink-0 border-r border-white/5 bg-surface-container-low flex flex-col h-full overflow-hidden">
            <div class="p-4 border-b border-white/5 flex items-center gap-3 shrink-0 h-[72px]">
                <div class="flex flex-col">
                    <span class="text-[10px] font-bold uppercase tracking-[0.2em] text-on-surface-variant">Automation</span>
                    <span class="text-sm font-bold text-white uppercase tracking-wider">定时任务</span>
                </div>
            </div>
            <div class="p-4 shrink-0 border-b border-white/5">
                <button id="tasks-new-btn" class="w-full inline-flex justify-center items-center gap-2 rounded-xl bg-primary/10 border border-primary/20 px-4 py-3 text-sm font-bold text-primary transition-all hover:bg-primary hover:text-[#00363b] hover:shadow-[0_0_12px_rgba(0,240,255,0.3)]">
                    <span class="material-symbols-outlined text-[18px]">add_task</span>
                    新建定时任务
                </button>
            </div>
            <div class="flex-1 overflow-y-auto p-4">
                <div id="tasks-list" class="flex flex-col gap-2"></div>
            </div>
        </div>

        <!-- Main Configuration Area -->
        <div class="flex-1 overflow-hidden flex flex-col relative bg-surface h-full">
            <div class="shrink-0 pt-8 px-10 pb-0 border-b border-white/5 bg-surface/80 backdrop-blur-md sticky top-0 z-30">
                <div class="flex flex-col gap-4 max-w-5xl mx-auto">
                    <!-- Title Row -->
                    <div class="flex items-center justify-between">
                        <div>
                            <div class="text-[10px] font-bold uppercase tracking-[0.22em] text-primary" id="task-panel-subtitle">Setup & Logs</div>
                            <h2 id="task-panel-title" class="mt-1 text-2xl font-headline font-bold text-white">新建任务</h2>
                        </div>
                        <div class="flex flex-col items-end gap-2">
                             <div id="task-current-status" class="inline-flex items-center rounded-full border border-outline-variant/20 bg-black/20 px-3 py-1 text-[11px] font-bold text-on-surface-variant tracking-wider">
                                未保存
                            </div>
                            <div class="flex gap-2" id="task-actions">
                                <button id="task-run-btn" type="button" class="hidden inline-flex items-center gap-1 rounded-lg border border-primary/20 bg-primary/10 px-2 py-1 text-[10px] font-bold text-primary transition-colors hover:bg-primary/20" title="立即触发此任务">
                                    <span class="material-symbols-outlined text-[14px]">play_arrow</span>立即执行
                                </button>
                                <button id="task-enable-btn" type="button" class="hidden inline-flex items-center gap-1 rounded-lg border border-emerald-400/20 bg-emerald-400/10 px-2 py-1 text-[10px] font-bold text-emerald-300 transition-colors hover:bg-emerald-400/20">
                                    <span class="material-symbols-outlined text-[14px]">check_circle</span>开启
                                </button>
                                <button id="task-disable-btn" type="button" class="hidden inline-flex items-center gap-1 rounded-lg border border-secondary/20 bg-secondary/10 px-2 py-1 text-[10px] font-bold text-secondary transition-colors hover:bg-secondary/20">
                                    <span class="material-symbols-outlined text-[14px]">pause_circle</span>暂停
                                </button>
                                <button id="task-delete-btn" type="button" class="hidden inline-flex items-center gap-1 rounded-lg border border-error/20 bg-error/10 px-2 py-1 text-[10px] font-bold text-error transition-colors hover:bg-error/20" title="删除任务">
                                    <span class="material-symbols-outlined text-[14px]">delete</span>删除
                                </button>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Tabs Navigation -->
                    <div class="flex gap-6 mt-4">
                        <button class="task-tab active pb-3 text-sm font-bold text-primary border-b-2 border-primary tracking-wide transition-colors" data-tab="config">基础配置</button>
                        <button class="task-tab pb-3 text-sm font-bold text-on-surface-variant border-b-2 border-transparent hover:text-white transition-colors tracking-wide" data-tab="logs">任务历史 (Logs)</button>
                    </div>
                </div>
            </div>

            <div class="flex-1 overflow-y-auto p-10 relative">
                <div class="max-w-5xl mx-auto h-full w-full">

                    <!-- TAB: Configuration -->
                    <div id="tab-config" class="tab-content block space-y-8 pb-10 w-full">
                        <form id="task-form" class="space-y-6">
                            <input id="task-id" type="hidden" value="">

                            <!-- Base Info Grid -->
                            <div class="grid grid-cols-1 gap-5 md:grid-cols-2 p-6 rounded-[20px] border border-white/5 bg-surface-container-low shadow-sm w-full">
                                <div class="md:col-span-2">
                                    <label class="mb-2 block text-xs font-bold uppercase tracking-[0.18em] text-on-surface-variant">任务名称</label>
                                    <input id="task-name" required class="w-full rounded-xl border border-outline-variant/20 bg-surface-container-highest px-4 py-3 text-sm text-white outline-none transition-colors focus:border-primary/50" placeholder="例如：每日早报生成 (必填)">
                                </div>
                                <div class="md:col-span-1">
                                    <label class="mb-2 block text-xs font-bold uppercase tracking-[0.18em] text-on-surface-variant">执行频率 (Cron)</label>
                                    <select id="task-cron-preset" class="w-full rounded-xl border border-outline-variant/20 bg-surface-container-highest px-4 py-3 text-sm text-white outline-none transition-colors focus:border-primary/50 mb-2">
                                        <option value="0 * * * *">每小时执行一次</option>
                                        <option value="0 8 * * *">每天早 08:00</option>
                                        <option value="0 12 * * *">每天中午 12:00</option>
                                        <option value="0 18 * * *">每天晚 18:00</option>
                                        <option value="0 9 * * 1-5">每工作日 09:00</option>
                                        <option value="custom">自定义 Cron 表达式...</option>
                                    </select>
                                    <input id="task-cron" required class="w-full rounded-xl border border-outline-variant/20 bg-surface-container-highest px-4 py-3 text-sm text-white outline-none font-mono transition-colors focus:border-primary/50" placeholder="例如：0 8 * * *">
                                </div>
                                <div class="md:col-span-2">
                                    <label class="mb-2 block text-xs font-bold uppercase tracking-[0.18em] text-on-surface-variant">发送渠道</label>
                                    <select id="task-integration-id" class="w-full rounded-xl border border-outline-variant/20 bg-surface-container-highest px-4 py-3 text-sm text-white outline-none transition-colors focus:border-primary/50">
                                        <!-- Load integrations dynamically -->
                                    </select>
                                    <p class="mt-2 text-xs text-on-surface-variant">定时任务会继承渠道上绑定的默认 Agent，并使用渠道的默认发送目标。</p>
                                </div>
                                <div class="md:col-span-2">
                                    <div id="task-integration-summary" class="rounded-[18px] border border-white/5 bg-black/20 px-4 py-4 text-xs leading-relaxed text-on-surface-variant">
                                        选择发送渠道后，这里会显示当前渠道绑定的 Agent 和默认发送目标。
                                    </div>
                                </div>
                                <div class="md:col-span-2">
                                    <label class="mb-2 block text-xs font-bold uppercase tracking-[0.18em] text-on-surface-variant">执行 Prompt</label>
                                    <textarea id="task-prompt" required rows="6" class="w-full rounded-2xl border border-outline-variant/20 bg-surface-container-highest px-4 py-4 text-sm leading-relaxed text-white outline-none transition-colors focus:border-primary/50" placeholder="描述你的任务要求，代理会在定时触发时严格按照此提示执行任务... (必填)"></textarea>
                                </div>
                            </div>

                            <!-- Actions Footer -->
                            <div class="sticky bottom-0 bg-surface/90 backdrop-blur-md pt-4 pb-0 z-10 border-t border-white/5 mt-8 w-full">
                                <div class="flex items-center gap-4">
                                    <button type="submit" class="inline-flex items-center gap-2 rounded-xl bg-primary px-6 py-3 text-sm font-bold text-[#00363b] shadow-[0_0_16px_rgba(0,240,255,0.22)] transition-all hover:bg-[#6af7ff]">
                                        <span class="material-symbols-outlined text-[18px]">save</span>保存任务
                                    </button>
                                </div>
                                <div id="task-form-feedback" class="mt-4 rounded-xl border border-outline-variant/10 bg-black/20 px-4 py-2.5 text-xs text-on-surface-variant w-full hidden"></div>
                            </div>
                        </form>
                    </div>

                    <!-- TAB: Logs -->
                    <div id="tab-logs" class="tab-content hidden h-full w-full flex-col gap-6 pb-10">
                        <section class="flex-1 rounded-[24px] border border-white/5 bg-surface-container-low p-6 shadow-sm flex flex-col h-full overflow-hidden w-full">
                            <div class="flex items-center justify-between mb-4 border-b border-white/5 pb-4 shrink-0">
                                <div>
                                    <h3 class="text-sm font-bold text-white flex items-center gap-2">
                                        <span class="material-symbols-outlined text-primary text-[18px]">history</span>
                                        任务执行历史
                                    </h3>
                                </div>
                                <div class="flex gap-2">
                                    <button id="task-logs-refresh-btn" class="w-7 h-7 rounded-lg border border-white/10 bg-white/5 flex items-center justify-center text-on-surface hover:text-primary transition-colors">
                                        <span class="material-symbols-outlined text-[14px]">refresh</span>
                                    </button>
                                </div>
                            </div>
                            <div id="task-logs-list" class="flex-1 overflow-y-auto pr-2 flex flex-col gap-2 relative">
                                <!-- empty state -->
                                <div class="absolute inset-0 flex flex-col items-center justify-center text-sm text-on-surface-variant opacity-70">
                                    <span class="material-symbols-outlined text-4xl mb-4">hourglass_empty</span>
                                    <p>纯前端展示，暂无任务执行历史。</p>
                                </div>
                            </div>
                        </section>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>
